version: "3.9"

services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - ai-network
    #deploy:
     # resources:
      #  reservations:
       #   devices:
        #    - capabilities: [gpu]
            #OR
    #runtime: nvidia
    #environment:
    #- NVIDIA_VISIBLE_DEVICES=all

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - openwebui_data:/app/backend/data
    restart: unless-stopped
    networks:
      - ai-network

  ai-agent:
    build: ./agent
    container_name: ai-agent
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - HF_TOKEN=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
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - ai-network

volumes:
  ollama_data:
  openwebui_data:

networks:
  ai-network:
    driver: bridge
